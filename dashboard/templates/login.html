<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign in — Tattva AI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{height:100vh;display:flex;align-items:center;justify-content:center;background:#f8f9fa;font-family:'Inter',-apple-system,sans-serif;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:48px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06);}
.logo{font-size:28px;color:#2563eb;margin-bottom:4px;font-weight:700;letter-spacing:2px;}
.logo-sub{font-size:10px;color:#9ca3af;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}
h1{font-size:22px;font-weight:600;color:#111;margin-bottom:8px;}
p{font-size:13px;color:#6b7280;margin-bottom:32px;line-height:1.6;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:#374151;transition:all .15s;}
.google-btn:hover{border-color:#2563eb;box-shadow:0 2px 8px rgba(37,99,235,.15);}
.stats{display:flex;gap:0;margin-top:32px;padding-top:24px;border-top:1px solid #f3f4f6;}
.stat{flex:1;text-align:center;}
.stat b{display:block;font-size:16px;font-weight:600;color:#111;}
.stat span{font-size:11px;color:#9ca3af;}
.divider{width:1px;background:#f3f4f6;}
.loading{display:none;font-size:13px;color:#6b7280;margin-top:16px;}
</style>
</head>
<body>
<div class="card">
  <img src="/static/logo.jpg" alt="Tattva AI" style="width:80px;height:80px;object-fit:contain;border-radius:12px;margin-bottom:12px;">
  <div class="logo-sub">Scientific Intelligence</div>
  <h1>Welcome to Tattva</h1>
  <p>Read 338,000+ scientific papers. Detect contradictions. Find cross-domain discoveries your team would never find alone.</p>
  <button class="google-btn" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.31z"/></svg>
    Continue with Google
  </button>
  <div class="loading" id="loading">Signing you in...</div>
  <div class="stats">
    <div class="stat"><b>338K+</b><span>Papers</span></div>
    <div class="divider"></div>
    <div class="stat"><b>11</b><span>Domains</span></div>
    <div class="divider"></div>
    <div class="stat"><b>87%</b><span>Accuracy</span></div>
  </div>
</div>
<script>
var _sb = null;
async function init(){
  const cfg = await fetch('/api/config').then(r=>r.json());
  _sb = supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);
  const hasCallback = window.location.hash.includes('access_token') || window.location.search.includes('code=');
  if(hasCallback){
    document.getElementById('loading').textContent='Completing sign in...';
    document.getElementById('loading').style.display='block';
    document.querySelector('.google-btn').style.display='none';
    await new Promise(r=>setTimeout(r,2000));
  }
  const {data:{session}} = await _sb.auth.getSession();
  if(session){ window.location.href='/app'; return; }
  document.querySelector('.google-btn').style.display='flex';
  document.getElementById('loading').style.display='none';
}
async function signIn(){
  if(!_sb) await init();
  document.getElementById('loading').style.display='block';
  await _sb.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo: window.location.origin+'/app'}
  });
}
init();
</script>
</body>
</html>
