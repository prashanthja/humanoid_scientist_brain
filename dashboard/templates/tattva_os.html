<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tattva OS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#020508;--surface:#080d14;--card:#0d1520;
  --accent:#0088ff;--accent2:#00c8ff;--white:#ffffff;
  --text:#c8deff;--muted:#3a5070;--dim:#1a2535;
  --green:#00e676;--red:#ff3d57;--amber:#ffb300;
  --mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 0.6s ease;}
.screen.active{display:flex;opacity:1;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,136,255,.008) 3px,rgba(0,136,255,.008) 4px);pointer-events:none;z-index:99998;}
#miniOrb{position:fixed;bottom:24px;right:24px;z-index:9999;display:none;flex-direction:column;align-items:flex-end;gap:8px;}
#miniText{max-width:260px;background:rgba(2,5,8,0.96);border:1px solid rgba(0,136,255,0.2);border-radius:10px;padding:8px 12px;font-size:11px;color:var(--text);line-height:1.6;display:none;}
#miniMic{width:32px;height:32px;border-radius:50%;border:1px solid rgba(0,136,255,0.25);background:rgba(0,136,255,0.06);color:rgba(0,136,255,0.7);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#homeLabel{font-family:var(--mono);font-size:9px;letter-spacing:4px;color:rgba(0,136,255,0.3);text-transform:uppercase;margin-bottom:32px;}
#homeText{font-size:15px;font-weight:300;color:rgba(200,222,255,0.8);text-align:center;max-width:400px;line-height:1.7;min-height:48px;padding:0 20px;margin-top:24px;}
#homeInput{display:flex;gap:10px;margin-top:24px;align-items:center;}
#homeInputField{background:rgba(255,255,255,0.04);border:1px solid rgba(0,136,255,0.15);border-radius:28px;padding:12px 22px;color:rgba(200,222,255,0.9);font-size:13px;font-family:var(--sans);outline:none;width:280px;}
#homeInputField:focus{border-color:rgba(0,136,255,0.4);}
#homeMic{width:44px;height:44px;border-radius:50%;border:1px solid rgba(0,136,255,0.3);background:rgba(0,136,255,0.07);color:rgba(0,136,255,0.8);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#homeSend{padding:12px 22px;border-radius:28px;border:1px solid rgba(0,136,255,0.3);background:rgba(0,136,255,0.1);color:rgba(200,222,255,0.9);font-size:13px;cursor:pointer;}
#homeHint{font-family:var(--mono);font-size:9px;color:rgba(0,136,255,0.2);letter-spacing:2px;margin-top:16px;}
.backBtn{position:fixed;top:20px;left:20px;z-index:9997;display:none;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;border:1px solid rgba(0,136,255,0.2);background:rgba(2,5,8,0.9);color:rgba(0,136,255,0.7);font-size:12px;font-family:var(--mono);cursor:pointer;letter-spacing:1px;}
.backBtn.visible{display:flex;}
#screenEvidence{padding:60px 40px 40px;justify-content:flex-start!important;}
#evidenceHeader{text-align:center;margin-bottom:40px;width:100%;}
#evidenceQuery{font-size:11px;font-family:var(--mono);color:rgba(0,136,255,0.5);letter-spacing:2px;margin-bottom:12px;}
#evidenceVerdict{font-size:36px;font-weight:600;color:var(--white);margin-bottom:8px;}
#evidenceConf{font-size:12px;color:var(--muted);}
#evidenceConfBar{width:300px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin:12px auto 0;overflow:hidden;}
#evidenceConfFill{height:100%;border-radius:2px;transition:width 2s ease;width:0%;}
#evidenceGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%;max-width:1100px;overflow-y:auto;max-height:calc(100vh - 260px);}
.eCard{background:var(--card);border:1px solid var(--dim);border-radius:12px;padding:18px;opacity:0;transform:translateY(20px);transition:all 0.5s ease;}
.eCard.show{opacity:1;transform:translateY(0);}
.eCard.support{border-left:2px solid var(--green);}
.eCard.contra{border-left:2px solid var(--red);}
.eCard.scope{border-left:2px solid var(--amber);}
.eCard.next{border-left:2px solid var(--accent);}
.eLabel{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--accent);margin-bottom:8px;}
.eText{font-size:11px;color:var(--muted);line-height:1.6;white-space:pre-line;}
#screenPortfolio{padding:60px 40px 40px;justify-content:flex-start!important;align-items:flex-start!important;}
#portTitle{font-size:28px;font-weight:600;color:var(--white);margin-bottom:4px;}
#portSub{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;margin-bottom:32px;}
#portGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%;overflow-y:auto;max-height:calc(100vh-180px);}
.pCard{background:var(--card);border:1px solid var(--dim);border-radius:12px;padding:20px;opacity:0;transform:scale(0.95);transition:all 0.4s ease;cursor:pointer;}
.pCard:hover{border-color:rgba(0,136,255,0.3);transform:scale(1.02)!important;}
.pCard.show{opacity:1;transform:scale(1);}
.pName{font-size:14px;font-weight:500;color:var(--white);margin-bottom:12px;}
.pBar{height:4px;border-radius:2px;background:rgba(255,255,255,0.06);margin-bottom:8px;overflow:hidden;}
.pFill{height:100%;border-radius:2px;transition:width 1.5s ease;width:0%;}
.pMeta{display:flex;justify-content:space-between;font-size:10px;font-family:var(--mono);}
#thinkOverlay{position:fixed;inset:0;z-index:9996;background:rgba(2,5,8,0.9);display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;backdrop-filter:blur(4px);}
#thinkOverlay.on{display:flex;}
#thinkTxt{font-family:var(--mono);font-size:11px;color:rgba(0,136,255,0.5);letter-spacing:2px;}
.mic-on{background:rgba(255,50,50,0.15)!important;border-color:rgba(255,50,50,0.5)!important;color:rgba(255,100,100,0.9)!important;}
</style>
</head>
<body>
<div class="backBtn" id="backBtn" onclick="goHome()">&#8592; HOME</div>
<div id="thinkOverlay"><canvas id="thinkCanvas" width="100" height="100"></canvas><div id="thinkTxt">ANALYZING...</div></div>
<div id="miniOrb"><div id="miniText"></div><div style="display:flex;gap:8px;align-items:center;"><button id="miniMic" onclick="micToggle()">&#127908;</button><canvas id="miniOrbCanvas" width="48" height="48" style="cursor:pointer;border-radius:50%;" onclick="goHome()"></canvas></div></div>

<div class="screen active" id="screenHome">
  <div id="homeLabel">TATTVA &middot; AUTONOMOUS SCIENTIST</div>
  <canvas id="homeOrb" width="260" height="260" style="cursor:pointer;" onclick="triggerBrief()"></canvas>
  <div id="homeText">Initializing...</div>
  <div id="homeInput">
    <button id="homeMic" onclick="micToggle()">&#127908;</button>
    <input id="homeInputField" placeholder="ask anything or say a command..." onkeydown="if(event.key==='Enter'){var v=this.value;this.value='';handleCommand(v);}"/>
    <button id="homeSend" onclick="var i=document.getElementById('homeInputField');var v=i.value;i.value='';handleCommand(v);">&#8594;</button>
  </div>
  <div id="homeHint">CLICK ORB &middot; SPEAK &middot; OR TYPE</div>
</div>

<div class="screen" id="screenEvidence">
  <div id="evidenceHeader">
    <div id="evidenceQuery"></div>
    <div id="evidenceVerdict"></div>
    <div id="evidenceConf"></div>
    <div id="evidenceConfBar"><div id="evidenceConfFill"></div></div>
  </div>
  <div id="evidenceGrid"></div>
</div>

<div class="screen" id="screenPortfolio">
  <div id="portTitle">Portfolio Health</div>
  <div id="portSub">EVIDENCE STRENGTH ACROSS YOUR RESEARCH DIRECTIONS</div>
  <div id="portGrid"></div>
</div>

<div class="screen" id="screenExperiment" style="padding:60px 40px;justify-content:flex-start!important;align-items:center!important;">
  <div style="text-align:center;margin-bottom:32px;width:100%;"><div id="expTitle" style="font-size:28px;font-weight:600;color:var(--white);margin-bottom:8px;">Experiment Designer</div><div style="font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;">DESIGNED BY TATTVA</div></div>
  <div id="expGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:900px;"></div>
</div>

<script>
const DOTS=(()=>{const pts=[],R=16;for(let i=0;i<=R;i++){const phi=Math.PI*i/R,y=Math.cos(phi),r=Math.sin(phi);const c=Math.max(1,Math.round(R*r));for(let j=0;j<c;j++){const t=2*Math.PI*j/c;pts.push({x:r*Math.cos(t),y,z:r*Math.sin(t),phi,theta:t});}}return pts;})();
let ST='idle',TT=0,RY=0,RX=0.38;
const CFG={idle:{s:0.005,a:0.06,c:[0,136,255],b:[180,220,255]},think:{s:0.028,a:0,c:[0,80,255],b:[80,180,255]},speak:{s:0.013,a:0.2,c:[0,180,255],b:[220,245,255]},listen:{s:0.009,a:0.13,c:[40,160,255],b:[200,235,255]}};
function drawS(cv,R,st){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height,cx=W/2,cy=H/2,cfg=CFG[st||ST];
  ctx.clearRect(0,0,W,H);RY+=cfg.s;RX=0.38+0.07*Math.sin(TT*0.007);
  const [cr,cg,cb]=cfg.c,[br,bg,bb]=cfg.b;
  const proj=DOTS.map(p=>{
    const pu=1+(st==='speak'||ST==='speak'?cfg.a*Math.sin(TT*0.18+p.phi*4):st==='listen'||ST==='listen'?cfg.a*Math.abs(Math.sin(TT*0.12+p.phi*3)):cfg.a*Math.sin(TT*0.04+p.phi*2));
    const sx={x:p.x*pu,y:p.y*pu,z:p.z*pu};
    const x1=sx.x*Math.cos(RY)-sx.z*Math.sin(RY),z1=sx.x*Math.sin(RY)+sx.z*Math.cos(RY);
    const y2=sx.y*Math.cos(RX)-z1*Math.sin(RX),z2=sx.y*Math.sin(RX)+z1*Math.cos(RX);
    return{sx:cx+x1*R,sy:cy-y2*R,sz:z2,d:(z2+1)/2};
  }).sort((a,b)=>a.sz-b.sz);
  proj.forEach(({sx,sy,d})=>{
    const f=d>0.5,al=f?0.18+d*0.82:0.04+d*0.12,dr=(f?2.4:1.1)*d*(R/110);
    if(f&&d>0.72){const g=ctx.createRadialGradient(sx,sy,0,sx,sy,dr*3.5);g.addColorStop(0,`rgba(${br},${bg},${bb},${al*0.4})`);g.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);ctx.beginPath();ctx.arc(sx,sy,dr*3.5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
    ctx.beginPath();ctx.arc(sx,sy,Math.max(0.4,dr),0,Math.PI*2);
    ctx.fillStyle=`rgba(${Math.round(cr+(br-cr)*d)},${Math.round(cg+(bg-cg)*d)},${Math.round(cb+(bb-cb)*d)},${al})`;ctx.fill();
  });
}
function tick(){
  drawS(document.getElementById('homeOrb'),104);
  const m=document.getElementById('miniOrbCanvas');if(m)drawS(m,20);
  const t=document.getElementById('thinkCanvas');if(t)drawS(t,44,'think');
  TT++;requestAnimationFrame(tick);
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const s=document.getElementById('screen'+id);if(s)s.classList.add('active');
  const back=document.getElementById('backBtn'),mini=document.getElementById('miniOrb');
  if(id==='Home'){back.classList.remove('visible');mini.style.display='none';}
  else{back.classList.add('visible');mini.style.display='flex';}
}
function goHome(){showScreen('Home');ST='idle';setText('Ready. What would you like to investigate?');}
let LIS=false,REC=null,SPK=false;
function setText(t){
  const e=document.getElementById('homeText'),m=document.getElementById('miniText');
  if(e)e.textContent=t;if(m){m.textContent=t;m.style.display=t?'block':'none';}
}
function speak(text,cb){
  if(!window.speechSynthesis){if(cb)cb();return;}
  window.speechSynthesis.cancel();
  ST='speak';SPK=true;setText(text);
  
  // Split into short sentences for cleaner delivery
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
  let idx=0;
  
  function speakNext(){
    if(idx>=sentences.length){
      ST='idle';SPK=false;if(cb)cb();return;
    }
    const u=new SpeechSynthesisUtterance(sentences[idx].trim().replace(/[*#&<>◈\[\]]/g,''));
    u.rate=0.88;u.pitch=0.95;u.lang='en-US';u.volume=1.0;
    const vs=window.speechSynthesis.getVoices();
    const v=vs.find(v=>v.name==='Samantha')||vs.find(v=>v.lang==='en-US');
    if(v)u.voice=v;
    u.onend=()=>{idx++;setTimeout(speakNext,120);};
    u.onerror=()=>{idx++;setTimeout(speakNext,120);};
    window.speechSynthesis.speak(u);
  }
  
  // Ensure voices loaded
  if(window.speechSynthesis.getVoices().length===0){
    window.speechSynthesis.onvoiceschanged=()=>speakNext();
  } else {
    speakNext();
  }
}
function micToggle(){
  if(LIS){if(REC)REC.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){speak('Voice not supported. Try Chrome.');return;}
  REC=new SR();REC.continuous=false;REC.interimResults=false;REC.lang='en-US';
  REC.onstart=()=>{LIS=true;ST='listen';setText('Listening...');document.querySelectorAll('#homeMic,#miniMic').forEach(b=>b.classList.add('mic-on'));};
  REC.onresult=(e)=>{const t=e.results[0][0].transcript;setText('You said: "'+t+'"');setTimeout(()=>handleCommand(t),300);};
  REC.onend=()=>{LIS=false;ST='idle';document.querySelectorAll('#homeMic,#miniMic').forEach(b=>b.classList.remove('mic-on'));};
  REC.onerror=()=>{LIS=false;ST='idle';document.querySelectorAll('#homeMic,#miniMic').forEach(b=>b.classList.remove('mic-on'));};
  REC.start();
}
function thinking(msg,on){
  ST=on?'think':'idle';
  document.getElementById('thinkTxt').textContent=msg||'ANALYZING...';
  document.getElementById('thinkOverlay').classList.toggle('on',on);
}
function handleCommand(text){
  if(!text||!text.trim())return;
  const t=text.toLowerCase().trim();
  if(t.match(/portfolio|health|direction/))return loadPortfolio();
  if(t.match(/experiment|design/))return loadExperiment(text);
  if(t.match(/brief|morning|overnight/))return triggerBrief();
  if(t.match(/home|back/))return goHome();
  loadEvidence(text);
}
async function loadEvidence(query){
  thinking('RETRIEVING EVIDENCE...',true);
  try{
    const[rr,cr]=await Promise.all([
      fetch('/api/run_research',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query})}),
      fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query,history:[],researcher_id:'enterprise'})})
    ]);
    const[rpt,chat]=await Promise.all([rr.json(),cr.json()]);
    thinking('',false);showScreen('Evidence');
    document.getElementById('evidenceQuery').textContent=query.toUpperCase();
    const vrd=(chat.verdict||rpt.proposal_verdict||'INCONCLUSIVE').toUpperCase();
    document.getElementById('evidenceVerdict').textContent=vrd;
    const conf=Math.round((chat.confidence||rpt.proposal_confidence||0.5)*100);
    document.getElementById('evidenceConf').textContent=conf+'% confidence · '+(chat.evidence_used||0)+' papers';
    const fill=document.getElementById('evidenceConfFill');
    fill.style.background=conf>70?'#00e676':conf>40?'#0088ff':'#ff3d57';
    setTimeout(()=>fill.style.width=conf+'%',100);
    const grid=document.getElementById('evidenceGrid');grid.innerHTML='';
    const contras=rpt.contradictions||[],papers=rpt.top_papers||[];
    const cards=[
      {l:'ANALYSIS',t:chat.response||'No response',cls:''},
      {l:'SUPPORTING PAPERS',t:papers.slice(0,3).map((p,i)=>`[${i+1}] ${(p.title||p.paper_title||p.text||'').substring(0,80)||'Paper '}`).join('\n\n')||'No supporting papers found.',cls:'support'},
      {l:'CONTRADICTIONS',t:contras.length?contras.slice(0,2).map(c=>c.supporting_paper+' vs '+c.contradicting_paper+'\n'+(c.implication||'')).join('\n\n'):'No contradictions detected.',cls:'contra'},
      {l:'SCOPE',t:'TESTED IN:\n'+(typeof rpt.scope==='object'?JSON.stringify(rpt.scope):(rpt.scope||'See analysis above'))+'\n\nNOT TESTED:\nEdge cases and extreme scales.',cls:'scope'},
      {l:'FOLLOW-UP SEARCHES',t:(chat.followup_searches||[]).filter(Boolean).map((s,i)=>`${i+1}. ${s}`).join('\n\n')||'No additional searches needed.',cls:''},
      {l:'NEXT EXPERIMENT',t:'Design a controlled study targeting the key gaps identified above.',cls:'next'},
    ];
    cards.forEach((c,i)=>{
      const d=document.createElement('div');
      d.className='eCard '+c.cls;
      d.innerHTML=`<div class="eLabel">${c.l}</div><div class="eText">${c.t}</div>`;
      grid.appendChild(d);setTimeout(()=>d.classList.add('show'),i*120);
    });
    speak(vrd+'. Confidence '+conf+'%. '+(contras.length?'I found '+contras.length+' contradiction'+(contras.length>1?'s':'')+'.':'Evidence is consistent.'));
  }catch(e){thinking('',false);speak('Error analyzing evidence. Please try again.');console.error(e);}
}
const DIRS=[
  {n:'LoRA Optimization',q:'Does LoRA reduce fine-tuning cost and memory?'},
  {n:'MoE Routing',q:'Does mixture of experts improve LLM efficiency?'},
  {n:'FlashAttention',q:'Does FlashAttention improve training speed?'},
  {n:'KV Cache Compression',q:'Does KV cache compression reduce memory?'},
  {n:'Speculative Decoding',q:'Does speculative decoding speed up inference?'},
  {n:'INT4 Quantization',q:'Does INT4 quantization preserve model quality?'},
];
async function loadPortfolio(){
  thinking('ANALYZING PORTFOLIO...',true);
  showScreen('Portfolio');
  const grid=document.getElementById('portGrid');grid.innerHTML='';
  DIRS.forEach((d,i)=>{
    const c=document.createElement('div');c.className='pCard';
    c.innerHTML=`<div class="pName">${d.n}</div><div class="pBar"><div class="pFill" id="pf${i}"></div></div><div class="pMeta"><span style="color:var(--muted);font-size:10px;">analyzing...</span><span style="color:var(--muted);">—</span></div>`;
    c.onclick=()=>loadEvidence(d.q);grid.appendChild(c);setTimeout(()=>c.classList.add('show'),i*100);
  });
  thinking('',false);
  speak('Loading portfolio. Analyzing evidence strength across all research directions.');
  for(let i=0;i<DIRS.length;i++){
    try{
      const r=await fetch('/api/run_research',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:DIRS[i].q})});
      const data=await r.json();
      const conf=Math.round((data.proposal_confidence||0.5)*100);
      const v=data.proposal_verdict||'inconclusive';
      const fill=document.getElementById('pf'+i);
      const card=grid.children[i];
      if(fill){fill.style.background=conf>70?'#00e676':conf>40?'#0088ff':'#ff3d57';setTimeout(()=>fill.style.width=conf+'%',200);}
      if(card)card.querySelector('.pMeta').innerHTML=`<span style="color:${conf>70?'#00e676':conf>40?'#0088ff':'#ff3d57'};font-family:var(--mono);font-size:10px;">${v.toUpperCase()}</span><span style="color:var(--muted);font-size:10px;">${conf}%</span>`;
    }catch(e){console.error(e);}
  }
  speak('Portfolio loaded. Click any direction to investigate in depth.');
}
async function loadExperiment(query){
  thinking('DESIGNING EXPERIMENT...',true);
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:'Design a specific experiment to test: '+query,history:[],researcher_id:'enterprise'})});
    const data=await r.json();
    thinking('',false);showScreen('Experiment');
    document.getElementById('expTitle').textContent=query.length>40?query.substring(0,40)+'...':query;
    const grid=document.getElementById('expGrid');grid.innerHTML='';
    const blocks=[
      {l:'HYPOTHESIS',t:query,cls:''},
      {l:'EXPERIMENT DESIGN',t:data.response||'Run controlled study.',cls:''},
      {l:'PREDICTED OUTCOME',t:'Based on analogous results, expect measurable effect with 60-80% probability.',cls:'next'},
      {l:'HOW TO RUN',t:'1. Set up baseline\n2. Apply treatment\n3. Measure outcome\n4. Compare to prediction\n5. Update beliefs',cls:''},
    ];
    blocks.forEach((b,i)=>{
      const d=document.createElement('div');
      d.className='eCard '+b.cls;
      d.innerHTML=`<div class="eLabel">${b.l}</div><div class="eText">${b.t}</div>`;
      grid.appendChild(d);setTimeout(()=>d.classList.add('show'),i*150);
    });
    speak('Experiment designed. Here is what to test and what to expect.');
  }catch(e){thinking('',false);speak('Error designing experiment.');console.error(e);}
}
async function triggerBrief(){
  thinking('CHECKING OVERNIGHT FINDINGS...',true);
  try{
    const r=await fetch('/api/run_research',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:'LoRA MoE efficiency recent findings'})});
    const data=await r.json();
    thinking('',false);
    const conf=Math.round((data.proposal_confidence||0.5)*100);
    speak('Good morning. I monitored the literature overnight. Your portfolio shows '+conf+'% confidence. '+(conf<60?'Some directions are weakening.':' Evidence is holding strong. What would you like to investigate?'),()=>{if(conf<60)setTimeout(loadPortfolio,500);});
  }catch(e){thinking('',false);speak('Good morning. Ready to investigate. What would you like to explore?');}
}
window.addEventListener('load',()=>{
  window.speechSynthesis.getVoices();
  setTimeout(()=>window.speechSynthesis.getVoices(),500);
  tick();
  setTimeout(()=>speak('Tattva online. Click the orb for your morning brief, or tell me what to investigate.'),1200);
});
</script>
</body>
</html>
